# RBAC so JFrog Runtime SA (runtimesa) can read runtime-config-configmap.
# Applied by deploy-gke workflow when JFrog Runtime is installed; NAMESPACE_PLACEHOLDER is replaced at apply time.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runtime-configmap-reader
  namespace: NAMESPACE_PLACEHOLDER
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["runtime-config-configmap"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runtimesa-configmap-reader
  namespace: NAMESPACE_PLACEHOLDER
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runtime-configmap-reader
subjects:
  - kind: ServiceAccount
    name: runtimesa
    namespace: NAMESPACE_PLACEHOLDER
