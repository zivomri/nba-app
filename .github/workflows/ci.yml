name: CI

on:
  push:
    branches:
      - main
  pull_request:
permissions:
  id-token: write
  contents: write
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      BUILD_NAME: nba-app-ci
      build_number: ${{ github.run_number }}
      PROJECT_KEY: ${{ vars.PROJECT_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Capture build version
        run: |
          echo NPM_PACKAGE_BUILD_VERSION=$(jq -r '.version' package.json) >> $GITHUB_ENV
          echo NPM_PACKAGE_NAME=$(jq -r '.name' package.json) >> $GITHUB_ENV 
      
      - name: Set up JFrog CLI
        uses: JFROG/setup-jfrog-cli@v4.8.0
        id: jfrog_cli
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          version: '2.96.0'
          oidc-provider-name: omriz-oidc
          oidc-audience: omriz-oidc
      - name: Configure NPM
        run: |
          jf npm-config --repo-deploy $PROJECT_KEY-npm --repo-resolve $PROJECT_KEY-npm     
      - name: Curation Audit
        run: |
          echo "will run something later"
          jf ca --format=table --threads=100
      - name: Install dependencies with JFrog CLI
        run: |
          jf npm install --build-name "$BUILD_NAME" --build-number "$build_number" --project $PROJECT_KEY
      - name: Build Next.js app
        run: npm run build
      - name: Upload Next.js build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          include-hidden-files: true
          path: |
            .next/standalone
            .next/static
            public
      - name: Publish npm package to JFrog Artifactory
        run: |
          jf npm publish --build-name "$BUILD_NAME" --build-number "$build_number" --project $PROJECT_KEY
      - name: Evidence Publish for NPM 🐸
        env:
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ secrets.EVIDENCE_KEY_ALIAS }}
        run: |
          # Write key to file so newlines are preserved (multiline PEM in secrets can break when passed inline)
          printf '%s\n' "$EVIDENCE_PRIVATE_KEY" > evidence_private_key.pem
          chmod 600 evidence_private_key.pem
          echo '{ "actor": "${{ github.actor }}", "date": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'" }' > sign_npm.json
          jf evd create-evidence \
            --package-name ${{ env.NPM_PACKAGE_NAME }} \
            --package-version ${{ env.NPM_PACKAGE_BUILD_VERSION }} \
            --package-repo-name ${{ env.PROJECT_KEY }}-npm \
            --key "$(cat evidence_private_key.pem)" \
            --key-alias "$EVIDENCE_KEY_ALIAS" \
            --predicate ./sign_npm.json \
            --predicate-type https://jfrog.com/evidence/signature/v1
          echo '🔎 NPM build Evidence attached: `signature` 🔏 ' >> $GITHUB_STEP_SUMMARY
      - name: Collect build environment info
        run: |
          jf rt build-collect-env "$BUILD_NAME" "$build_number" --project $PROJECT_KEY
      - name: Publish build info to JFrog Artifactory
        run: |
          jf rt build-publish "$BUILD_NAME" "$build_number"  --project $PROJECT_KEY
      - name: Sign Build Evidence 🐸
        env:
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ secrets.EVIDENCE_KEY_ALIAS }}
        run: |
          printf '%s\n' "$EVIDENCE_PRIVATE_KEY" > evidence_private_key.pem
          chmod 600 evidence_private_key.pem
          echo '{ "actor": "${{ github.actor }}", "date": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'" }' > sign_build.json
          jf evd create-evidence \
            --predicate ./sign_build.json \
            --predicate-type https://jfrog.com/evidence/build-signature/v1 \
            --build-name $BUILD_NAME \
            --build-number $build_number \
            --project $PROJECT_KEY \
            --key "$(cat evidence_private_key.pem)" \
            --key-alias "$EVIDENCE_KEY_ALIAS"
          echo '🔎 Build Evidence attached: `build-signature` 🔏 ' >> $GITHUB_STEP_SUMMARY
      - name: Index Build Info in Xray
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          echo "Checking if build '$BUILD_NAME' is indexed in Xray..."
          jf xr curl "api/v1/binMgr/default/builds?projectKey=$PROJECT_KEY" > builds_status.json
          
          IS_NON_INDEXED=$(jq --arg bn "$BUILD_NAME" '.non_indexed_builds | index($bn) != null' builds_status.json)
          
          if [ "$IS_NON_INDEXED" = "true" ]; then
            echo "Build '$BUILD_NAME' is not indexed. Indexing it now..."
            jq --arg bn "$BUILD_NAME" '
              .non_indexed_builds |= map(select(. != $bn)) |
              .indexed_builds |= (. + [$bn])
            ' builds_status.json > updated_builds.json
            
            echo "Updated builds payload:"
            cat updated_builds.json
            
            jf xr curl -X PUT "api/v1/binMgr/default/builds?projectKey=$PROJECT_KEY" -H "Content-Type: application/json" -d @updated_builds.json
            echo "Build '$BUILD_NAME' has been indexed."
              else
            echo "Build '$BUILD_NAME' is already indexed or does not exist in non-indexed list."
          fi
      - name: Scan Build Info with JFrog Xray
        run: |
          jf build-scan --format=json "$BUILD_NAME" "$build_number" --project $PROJECT_KEY
      - name: Generate SonarQube coverage evidence JSON
        env:
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ secrets.EVIDENCE_KEY_ALIAS }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          printf '%s\n' "$EVIDENCE_PRIVATE_KEY" > evidence_private_key.pem
          chmod 600 evidence_private_key.pem
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          PACKAGE_NAME=$(jq -r '.name' package.json)

          mkdir -p .jfrog/evidence
          COVERAGE_PERCENT=87.5
          NOW_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > .jfrog/evidence/sonarqube-coverage.json <<EOF
          {
            "predicateType": "https://jfrog.com/evidence/sonarqube/v1",
            "predicate": {
              "projectStatus": {
                "status": "ERROR",
                "ignoredConditions": false,
                "caycStatus": "non-compliant",
                "conditions": [
                  {
                    "status": "ERROR",
                    "metricKey": "new_coverage",
                    "comparator": "LT",
                    "errorThreshold": "85",
                    "actualValue": "82.50562381034781"
                  },
                  {
                    "status": "OK",
                    "metricKey": "skipped_tests",
                    "comparator": "GT",
                    "actualValue": "0"
                  }
                ],
                "period": {
                  "mode": "last_version",
                  "date": "2000-04-27T00:45:23+0200",
                  "parameter": "2015-12-07"
                }
              }
            },
            "createdAt": "2222-01-01T00:00:00.000Z",
            "createdBy": "SonarQube",
            "markdown": "# SVG in Markdown example\n\n## Details\n\n- **Type**: svg examples\n\nThis demonstrates the syntax for embedding an SVG without a separate file.\n\n!"
          }
          EOF

          cat > .jfrog/evidence/sonarqube-coverage.md <<EOF
          # SVG in Markdown example\n\n## Details\n\n- **Type**:
              svg examples\n\nThis demonstrates the syntax for embedding an SVG
              without a separate file.\n\n!
          EOF

          jf evd create-evidence \
            --predicate .jfrog/evidence/sonarqube-coverage.json \
            --markdown .jfrog/evidence/sonarqube-coverage.md \
            --predicate-type "https://jfrog.com/evidence/sonarqube/v1" \
            --project $PROJECT_KEY \
            --package-name "$PACKAGE_NAME" \
            --package-version "$PACKAGE_VERSION" \
            --package-repo-name $PROJECT_KEY-npm \
            --provider-id github-actions \
            --key "$(cat evidence_private_key.pem)" \
            --key-alias "$EVIDENCE_KEY_ALIAS" 
      - name: Print jf evd help
        run: |
          jf evd --help

  build-docker:
    needs: build-and-publish
    runs-on: ubuntu-latest
    env:
      BUILD_NAME: nba-app-ci-docker
      build_number: ${{ github.run_number }}
      PROJECT_KEY: ${{ vars.PROJECT_KEY }}
      DOCKER_REPO_NAME: rsa-demo-docker-local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Next.js build artifacts
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: next-build
      - name: Set up JFrog CLI
        uses: JFROG/setup-jfrog-cli@v4.8.0
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          version: '2.96.0'
          oidc-provider-name: omriz-oidc
          oidc-audience: omriz-oidc
      - name: Capture version and image tag
        run: |
          NPM_PACKAGE_BUILD_VERSION=$(jq -r '.version' package.json)
          echo "NPM_PACKAGE_BUILD_VERSION=$NPM_PACKAGE_BUILD_VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=${NPM_PACKAGE_BUILD_VERSION}-b${build_number}" >> $GITHUB_ENV
      - name: Enable Buildx
        run: |
          docker buildx create --name mybuilder --driver docker-container --use
          docker buildx inspect --bootstrap
      - name: Login to JFrog Artifactory (Docker)
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ARTIFACTORY_USER: omriz
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
        run: |
          JF_HOST="${JF_URL#https://}"
          echo "$JF_ACCESS_TOKEN" | docker login "$JF_HOST" -u "$JF_ARTIFACTORY_USER" --password-stdin
      - name: Build Docker image
        id: build
        env:
          JF_URL: ${{ secrets.JF_URL }}
        run: |
          JF_HOST="${JF_URL#https://}"
          CACHE_REF="${JF_HOST}/${DOCKER_REPO_NAME}/nba-app:buildcache"
          docker buildx build --provenance=false --push \
            --cache-from type=registry,ref="${CACHE_REF}" \
            --cache-to type=registry,ref="${CACHE_REF}",mode=max \
            --metadata-file=build-metadata \
            --platform linux/arm64,linux/amd64 \
            --label build.number="${build_number}" \
            --label build.name="${BUILD_NAME}" \
            --label project.name="${PROJECT_KEY}" \
            --label author="${{ github.actor }}" \
            -t "${JF_HOST}/${DOCKER_REPO_NAME}/nba-app:${NPM_PACKAGE_BUILD_VERSION}-b${build_number}" \
            -f Dockerfile.prebuilt next-build
      - name: Publish Docker build info to JFrog Artifactory
        run: |
          jf rt build-docker-create "/${DOCKER_REPO_NAME}" --image-file=build-metadata \
            --build-name="${BUILD_NAME}" \
            --build-number="${build_number}" \
            --project="${PROJECT_KEY}"
      - name: Publish build to Artifactory (with Docker image)
        run: |
          jf rt build-publish "${BUILD_NAME}" "${build_number}" --project "${PROJECT_KEY}"
      - name: Sign Docker image evidence 🐸
        env:
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ secrets.EVIDENCE_KEY_ALIAS }}
        run: |
          printf '%s\n' "$EVIDENCE_PRIVATE_KEY" > evidence_private_key.pem
          chmod 600 evidence_private_key.pem
          echo '{ "actor": "${{ github.actor }}", "date": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'", "image": "${DOCKER_REPO_NAME}/nba-app:'"${IMAGE_TAG}"'" }' > sign_docker.json
          jf evd create-evidence \
            --predicate ./sign_docker.json \
            --predicate-type https://jfrog.com/evidence/build-signature/v1 \
            --build-name "${BUILD_NAME}" \
            --build-number "${build_number}" \
            --project "${PROJECT_KEY}" \
            --key "$(cat evidence_private_key.pem)" \
            --key-alias "$EVIDENCE_KEY_ALIAS"
          echo '🔎 Docker image Evidence attached: `build-signature` 🔏 ' >> $GITHUB_STEP_SUMMARY
      - name: Index Build Info in Xray (Docker)
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          echo "Checking if build '${BUILD_NAME}' is indexed in Xray..."
          jf xr curl "api/v1/binMgr/default/builds?projectKey=${PROJECT_KEY}" > builds_status.json
          IS_NON_INDEXED=$(jq --arg bn "${BUILD_NAME}" '.non_indexed_builds | index($bn) != null' builds_status.json)
          if [ "$IS_NON_INDEXED" = "true" ]; then
            echo "Build '${BUILD_NAME}' is not indexed. Indexing it now..."
            jq --arg bn "${BUILD_NAME}" '
              .non_indexed_builds |= map(select(. != $bn)) |
              .indexed_builds |= (. + [$bn])
            ' builds_status.json > updated_builds.json
            jf xr curl -X PUT "api/v1/binMgr/default/builds?projectKey=${PROJECT_KEY}" -H "Content-Type: application/json" -d @updated_builds.json
            echo "Build '${BUILD_NAME}' has been indexed."
          else
            echo "Build '${BUILD_NAME}' is already indexed or does not exist in non-indexed list."
          fi
      - name: Scan Docker build with JFrog Xray
        run: |
          jf build-scan --format=json "${BUILD_NAME}" "${build_number}" --project "${PROJECT_KEY}"

  create-app-version:
    needs: [build-and-publish, build-docker]
    runs-on: ubuntu-latest
    env:
      BUILD_NUMBER: ${{ github.run_number }}
      JF_URL: ${{ secrets.JF_URL }}
      JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
      PROJECT_KEY: ${{ vars.PROJECT_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JFrog CLI
        uses: JFROG/setup-jfrog-cli@v4.8.0
        id: jfrog_cli
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          version: '2.96.0'
          oidc-provider-name: omriz-oidc
          oidc-audience: omriz-oidc
      - name: "[Setup] AppTrust variables"
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          APP_VERSION=$(jq -r '.version' package.json)
          APPLICATION_KEY="nba-app"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "APPLICATION_KEY=$APPLICATION_KEY" >> $GITHUB_ENV
          echo "✅ AppTrust variables set:"
          echo "   📦 Application: $APPLICATION_KEY"
          echo "   🏷️ Version: $APP_VERSION"
      - name: "[Ensure] AppTrust application exists"
        run: |
          set +e
          jf apptrust app-create "$APPLICATION_KEY" --application-name "NBA App" --project "$PROJECT_KEY" 2>&1 | tee app_create_out.txt
          RV=$?
          set -e
          if [[ $RV -eq 0 ]]; then
            echo "✅ Created AppTrust application: $APPLICATION_KEY"
          elif grep -qi "already exists\|conflict\|duplicate" app_create_out.txt 2>/dev/null; then
            echo "✅ AppTrust application already exists: $APPLICATION_KEY"
          else
            cat app_create_out.txt
            exit $RV
          fi
      - name: "[Create] Create AppTrust Application Version (REST API)"
        run: |
          set -euo pipefail
          envsubst < .jfrog/payloads-templates/app-version-payload-template.json > .jfrog/payloads-templates/app-version-payload-template.json.tmp
          echo "📤 Request payload:"
          cat .jfrog/payloads-templates/app-version-payload-template.json.tmp
          RESP_BODY="response_body.json"
          HTTP_STATUS=$(curl -sS -L -o "$RESP_BODY" -w "%{http_code}" -X POST \
            "$JF_URL/apptrust/api/v1/applications/$APPLICATION_KEY/versions?async=false" \
            -H "Authorization: Bearer $JF_ACCESS_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "X-JFrog-Project: $PROJECT_KEY" \
            -d @.jfrog/payloads-templates/app-version-payload-template.json.tmp)
          echo "🔢 HTTP Status: $HTTP_STATUS"
          echo "📨 Response Body:"; cat "$RESP_BODY" || true; echo
          rm -f "$RESP_BODY"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "❌ Failed to create application version" >&2
            exit 1
          fi
          # Robust validation: fetch content and require status == COMPLETED
          CONTENT_FILE=$(mktemp)
          CONTENT_STATUS=$(curl -sS -L -o "$CONTENT_FILE" -w "%{http_code}" \
            "$JF_URL/apptrust/api/v1/applications/$APPLICATION_KEY/versions/$APP_VERSION/content" \
            -H "Authorization: Bearer $JF_ACCESS_TOKEN" \
            -H "Accept: application/json")
          if [[ "$CONTENT_STATUS" != "200" ]]; then
            echo "❌ Version content endpoint returned HTTP $CONTENT_STATUS for $APPLICATION_KEY@$APP_VERSION" >&2
            echo "📨 Response Body:"; cat "$CONTENT_FILE" || true; echo
            rm -f "$CONTENT_FILE"
            exit 1
          fi
          VERSION_STATE=$(jq -r '.status // empty' "$CONTENT_FILE" 2>/dev/null || echo "")
          echo "📨 Version Content:"; cat "$CONTENT_FILE" || true; echo
          rm -f "$CONTENT_FILE"
          if [[ "$VERSION_STATE" != "COMPLETED" ]]; then
            echo "❌ Application version not in COMPLETED state (status='$VERSION_STATE') for $APPLICATION_KEY@$APP_VERSION" >&2
            exit 1
          fi
          echo "✅ Application version created and validated (COMPLETED): $APPLICATION_KEY@$APP_VERSION"
          echo "📦 Packages will be automatically bound from build sources (npm + docker)"
      - name: "[Evidence] Prepare UNASSIGNED templates"
        run: |
          set -euo pipefail
          echo "📄 Preparing SLSA and Jira templates"
          cat > slsa.template.md <<'EOF'
          # SLSA Provenance Report 🛡️

          This document summarizes the SLSA (Supply-chain Levels for Software Artifacts) provenance and build context for this version.

          ---

          ## Evidence Details

          * **Framework**: `SLSA`
          * **SLSA Level**: `v1`
          * **Generated At**: `${NOW_TS}`
          * **Builder**: `GitHub Actions`
          * **Workflow**: `${{ github.workflow }}`
          * **Repository**: `${{ github.repository }}`
          * **Commit**: `${{ github.sha }}`
          EOF
          cat > jira.template.md <<'EOF'
          # 🎫 Jira Release Notes

          This evidence lists the Jira issues included in this application version.

          ---

          ## Tickets
          - ${T1} — ${T1_TYPE}
          - ${T2} — ${T2_TYPE}
          - ${T3} — ${T3_TYPE}
          EOF

      - name: "[Evidence] Attach UNASSIGNED (SLSA, Jira)"
        env:
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ secrets.EVIDENCE_KEY_ALIAS }}
        run: |
          set -euo pipefail
          printf '%s\n' "$EVIDENCE_PRIVATE_KEY" > evidence_private_key.pem
          chmod 600 evidence_private_key.pem
          if ! command -v envsubst >/dev/null 2>&1; then sudo apt-get update -y && sudo apt-get install -y gettext-base; fi
          NOW_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          export NOW_TS="${NOW_TS}"
          # SLSA predicate and markdown
          cat > slsa.json <<JSON
          {
            "provenance": {
              "framework": "SLSA",
              "level": "v1",
              "generatedAt": "${NOW_TS}",
              "attachStage": "UNASSIGNED",
              "gateForPromotionTo": "DEV"
            }
          }
          JSON
          envsubst < slsa.template.md > slsa.md
          jf evd create-evidence \
            --predicate slsa.json \
            --markdown slsa.md \
            --predicate-type "https://slsa.dev/provenance/v1" \
            --release-bundle "$APPLICATION_KEY" \
            --release-bundle-version "$APP_VERSION" \
            --project "$PROJECT_KEY" \
            --key "$(cat evidence_private_key.pem)" \
            --key-alias "$EVIDENCE_KEY_ALIAS" || echo "⚠️ SLSA evidence attach failed"

          # Jira predicate and markdown
          # Generate a small set of pseudo tickets and types for the release notes
          T1="BV-$(( (${GITHUB_RUN_NUMBER:-0} % 200) + 100 ))"
          T2="BV-$(( ((${GITHUB_RUN_NUMBER:-0} + ${GITHUB_RUN_ATTEMPT:-0}) % 200) + 300 ))"
          T3="BV-$(( ((${GITHUB_RUN_NUMBER:-0} * 3 + ${GITHUB_RUN_ATTEMPT:-0}) % 200) + 500 ))"
          TYPES=(feature bug improvement)
          T1_TYPE="${TYPES[$(( ${GITHUB_RUN_NUMBER:-0} % 3 ))]}"
          T2_TYPE="${TYPES[$(( (${GITHUB_RUN_NUMBER:-0} + 1) % 3 ))]}"
          T3_TYPE="${TYPES[$(( (${GITHUB_RUN_NUMBER:-0} + 2) % 3 ))]}"
          export T1 T2 T3 T1_TYPE T2_TYPE T3_TYPE
          cat > jira.json <<JSON
          {
            "jira": {
              "tickets": [
                {"id": "${T1}", "type": "${T1_TYPE}"},
                {"id": "${T2}", "type": "${T2_TYPE}"},
                {"id": "${T3}", "type": "${T3_TYPE}"}
              ]
            }
          }
          JSON
          envsubst < jira.template.md > jira.md
          jf evd create-evidence \
            --predicate jira.json \
            --markdown jira.md \
            --predicate-type "https://atlassian.com/evidence/jira/release/v1" \
            --release-bundle "$APPLICATION_KEY" \
            --release-bundle-version "$APP_VERSION" \
            --project "$PROJECT_KEY" \
            --key "$(cat evidence_private_key.pem)" \
            --key-alias "$EVIDENCE_KEY_ALIAS" || echo "⚠️ Jira evidence attach failed"

      - name: "[Promote] Promote Application Version to DEV"
        run: |
          set -euo pipefail
          PROMOTE_PAYLOAD='{"target_stage": "DEV", "promotion_type": "move"}'
          PROMOTE_URL="$JF_URL/apptrust/api/v1/applications/$APPLICATION_KEY/versions/$APP_VERSION/promote"
          echo "Promoting $APPLICATION_KEY@$APP_VERSION to DEV..."
          HTTP_STATUS=$(curl -sS -L -o promote_response.json -w "%{http_code}" -X POST \
            "$PROMOTE_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $JF_ACCESS_TOKEN" \
            -d "$PROMOTE_PAYLOAD")
          echo "🔢 HTTP Status: $HTTP_STATUS"
          echo "📨 Response Body:"; cat promote_response.json || true; echo
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "❌ Promotion to DEV failed" >&2
            exit 1
          fi
          echo "✅ Application version promoted to DEV: $APPLICATION_KEY@$APP_VERSION"
          rm -f promote_response.json
