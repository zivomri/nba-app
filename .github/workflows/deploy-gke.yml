# Deploy to GKE using Workload Identity Federation (no service account keys).
# Triggered only by workflow_dispatch or repository_dispatch (e.g. JFrog AppTrust release webhook).
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   GCP_PROJECT_ID                    - GCP project ID
#   GCP_REGION                        - GKE cluster region (e.g. us-central1)
#   GKE_CLUSTER_NAME                  - GKE cluster name
#   HELM_NAMESPACE                    - Kubernetes namespace for the Helm release
#   GCP_WORKLOAD_IDENTITY_PROVIDER    - WIF provider resource name; must use PROJECT_NUMBER not project ID
#       (e.g. projects/429932512068/locations/global/workloadIdentityPools/github-actions-pool/providers/jfrog-org)
#   GCP_SERVICE_ACCOUNT               - GCP service account email (e.g. my-sa@my-project.iam.gserviceaccount.com)
#   JF_URL                            - JFrog platform URL (e.g. https://your-instance.jfrog.io)
#   JF_ACCESS_TOKEN                   - JFrog access token (Bearer for AppTrust API; used by JFrog CLI)
#   JF_USERNAME                       - JFrog/Artifactory username (for Docker image pull secret; token is used as password)
#
# Optional: GCP_ZONE for zonal clusters (e.g. us-central1-a); then get-credentials uses --zone instead of --region.
# Note: If image pull fails with 401, ensure JF_USERNAME and JF_ACCESS_TOKEN are set and delete the existing
#       jfrog-registry-secret in the namespace so the next run recreates it with correct credentials.
name: Deploy to GKE (Workload Identity)

on:
  workflow_dispatch:
    inputs:
      app_key:
        description: 'Application key (e.g. nba-app)'
        required: false
        default: 'nba-app'
      stage:
        description: 'Stage (e.g. PROD)'
        required: false
        default: 'PROD'
      version:
        description: 'Version (e.g. 1.0.13)'
        required: false
        default: '1.0.13'
  repository_dispatch:
    types: [jfrog-apptrust-release]

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set deploy parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app_key=${{ github.event.inputs.app_key }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "stage=${{ github.event.inputs.stage }}" >> $GITHUB_OUTPUT
            echo "Using app_key=${{ github.event.inputs.app_key }} version=${{ github.event.inputs.version }} stage=${{ github.event.inputs.stage }} (workflow_dispatch)"
          else
            echo "app_key=${{ github.event.client_payload.app_key }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "stage=${{ github.event.client_payload.stage }}" >> $GITHUB_OUTPUT
            echo "Using app_key=${{ github.event.client_payload.app_key }} version=${{ github.event.client_payload.version }} (repository_dispatch)"
          fi

      - name: Print repository_dispatch payload
        if: github.event_name == 'repository_dispatch'
        run: |
          echo 'Repository dispatch payload (client_payload):'
          echo '${{ toJSON(github.event.client_payload) }}' | jq .

      - name: Get app version content (AppTrust API)
        if: github.event_name == 'repository_dispatch'
        id: get-version-content
        run: |
          APP_KEY='${{ steps.params.outputs.app_key }}'
          VERSION='${{ steps.params.outputs.version }}'
          RESP=$(curl -sS -H "Authorization: Bearer ${{ secrets.JF_ACCESS_TOKEN }}" \
            "${{ secrets.JF_URL }}/apptrust/api/v1/applications/${APP_KEY}/versions/${VERSION}/content?include=sources")
          BUILD_NUMBER=$(echo "$RESP" | jq -r --arg app "$APP_KEY" '.sources[] | select(.type=="build" and .build.name == ($app + "-ci-docker")) | .build.number' | head -1)
          PROJECT_KEY=$(echo "$RESP" | jq -r '.project_key')
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "project_key=$PROJECT_KEY" >> $GITHUB_OUTPUT
      - name: Set up JFrog CLI
        uses: JFROG/setup-jfrog-cli@v4.8.0
        id: jfrog_cli
        env:
          JF_URL: ${{ secrets.JF_URL }}
        with:
          version: '2.96.0'
          oidc-provider-name: jfrog-org
          oidc-audience: jfrog-org
      - name: Get build info and print Docker image tag
        if: github.event_name == 'repository_dispatch'
        id: get-build-info
        run: |
          BUILD_NAME='${{ steps.params.outputs.app_key }}-ci-docker'
          BUILD_NUMBER='${{ steps.get-version-content.outputs.build_number }}'
          PROJECT_KEY='${{ steps.get-version-content.outputs.project_key }}'
          jf rt curl "/api/build/${BUILD_NAME}/${BUILD_NUMBER}?project=${PROJECT_KEY}" -s | jq . > build-info.json
          DOCKER_IMAGE_TAG=$(jq -r '.buildInfo.modules[0].properties["docker.image.tag"]' build-info.json)
          # Build info may contain full image reference; use only the tag (after last colon)
          if [[ "$DOCKER_IMAGE_TAG" == *:* ]]; then
            DOCKER_IMAGE_TAG="${DOCKER_IMAGE_TAG##*:}"
          fi
          echo "Docker image tag: $DOCKER_IMAGE_TAG"
          echo "imagetag=$DOCKER_IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4

      # Debug: print OIDC claims sent to GCP (only for workflow_dispatch). Remove after fixing WIF.
      - name: Debug OIDC token claims (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          WIF_AUDIENCE: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          if [ -z "$WIF_AUDIENCE" ]; then echo "GCP_WORKLOAD_IDENTITY_PROVIDER not set, skipping"; exit 0; fi
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            -H "Content-Type: application/json" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" \
            -d "{\"audience\":\"$WIF_AUDIENCE\"}" | jq -r '.value')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then echo "Could not get OIDC token"; exit 0; fi
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          echo "OIDC token claims (for WIF attribute condition):"
          echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null | jq . || true

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          audience: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE credentials
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          CLUSTER_NAME="${{ secrets.GKE_CLUSTER_NAME }}"
          REGION="${{ secrets.GCP_REGION }}"
          ZONE="${{ secrets.GCP_ZONE }}"
          if [[ -n "$ZONE" ]]; then
            gcloud container clusters get-credentials "$CLUSTER_NAME" --zone "$ZONE" --project "$PROJECT_ID"
          else
            gcloud container clusters get-credentials "$CLUSTER_NAME" --region "$REGION" --project "$PROJECT_ID"
          fi

      - name: Set image tag for deploy
        id: image-tag
        run: |
          TAG="${{ steps.get-build-info.outputs.imagetag }}"
          if [ -z "$TAG" ]; then TAG="${{ steps.params.outputs.version }}"; fi
          if [ -z "$TAG" ]; then TAG=latest; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using image tag: $TAG"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Create image pull secret for JFrog
        run: |
          NAMESPACE="${{ secrets.HELM_NAMESPACE }}"
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl delete secret jfrog-registry-secret -n "$NAMESPACE" --ignore-not-found
          kubectl create secret docker-registry jfrog-registry-secret \
            --docker-server=solenglatest.jfrog.io \
            --docker-username="${{ secrets.JF_USERNAME }}" \
            --docker-password="${{ secrets.JF_ACCESS_TOKEN }}" \
            --namespace "$NAMESPACE"
          echo "Created/updated jfrog-registry-secret"

      - name: Deploy Helm chart
        run: |
          RELEASE_NAME="nba-app"
          CHART_PATH="./helm/nba-app"
          NAMESPACE="${{ secrets.HELM_NAMESPACE }}"
          IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image.tag="$IMAGE_TAG" \
            --wait \
            --timeout 5m
