{{- if .Values.useHelloWorld }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hello-world.name" . }}-html
  labels:
    app.kubernetes.io/name: {{ include "hello-world.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>Hello World</title></head>
    <body><h1>Hello World</h1><p>Helm chart deployment.</p></body>
    </html>
{{- end }}
