<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1000" />
  <title>NBA App Banner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .banner {
      width: 1000px;
      height: 240px;
      background: linear-gradient(135deg, #1d428a 0%, #c9082a 50%, #1d428a 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .players {
      display: flex;
      height: 100%;
      flex: 1;
      min-width: 0;
    }
    .players-left { justify-content: flex-end; }
    .players-right { justify-content: flex-start; }
    .player-img {
      width: 160px;
      height: 240px;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0.92;
    }
    .players-left .player-img { object-position: center top; }
    .players-right .player-img { object-position: center top; }
    .center-block {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 20px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.25);
      height: 100%;
      min-width: 280px;
    }
    .nba-logo {
      width: 72px;
      height: 72px;
      flex-shrink: 0;
    }
    .title {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="players players-left">
      <img class="player-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Stephen_Curry_Shooting_%28cropped%29.jpg/320px-Stephen_Curry_Shooting_%28cropped%29.jpg" alt="Stephen Curry" />
      <img class="player-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Nikola_Joki%C4%87_2021.jpg/320px-Nikola_Joki%C4%87_2021.jpg" alt="Nikola Jokic" />
    </div>
    <div class="center-block">
      <img class="nba-logo" id="nba-logo" src="https://cdn.worldvectorlogo.com/logos/nba-2.svg" alt="NBA" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22%23c9082a%22 cx=%2250%22 cy=%2250%22 r=%2248%22/%3E%3Cpath fill=%22%231d428a%22 d=%22M50 8v84l-30-42h20l-8-20 18 10 18-10-8 20h20L50 8z%22/%3E%3Ctext x=%2250%22 y=%2272%22 fill=%22%23fff%22 font-size=%2224%22 font-weight=%22bold%22 text-anchor=%22middle%22%3ENBA%3C/text%3E%3C/svg%3E';" />
      <span class="title">NBA APP</span>
    </div>
    <div class="players players-right">
      <img class="player-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Shai_Gilgeous-Alexander_2021.jpg/320px-Shai_Gilgeous-Alexander_2021.jpg" alt="Shai Gilgeous-Alexander" />
      <img class="player-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Jayson_Tatum_2021.jpg/320px-Jayson_Tatum_2021.jpg" alt="Jayson Tatum" />
    </div>
  </div>
</body>
</html>
